<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Youth Charity Foundation - Tools</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            padding: 40px;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 32px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 40px;
            font-size: 16px;
        }

        .tools-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        .tool-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 12px;
            text-decoration: none;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .tool-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
        }

        .tool-icon {
            font-size: 40px;
            margin-bottom: 15px;
        }

        .tool-name {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .tool-desc {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 15px;
        }

        .tool-btn {
            display: inline-block;
            background: white;
            color: #667eea;
            padding: 10px 25px;
            border-radius: 20px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .tool-card:hover .tool-btn {
            transform: scale(1.05);
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Youth Charity Foundation</h1>
        <p class="subtitle">Project Management & Productivity Tools</p>

        <div class="tools-grid">
            <a href="todo-app/index.html" class="tool-card">
                <div class="tool-icon">✓</div>
                <div class="tool-name">To-Do List</div>
                <div class="tool-desc">Manage your tasks with local storage</div>
                <span class="tool-btn">Open App →</span>
            </a>
        </div>
    </div>
</body>
</html>
