version: '3.8'

services:
  postgres:
    image: postgres:14
    environment:
      POSTGRES_DB: ngo_db
      POSTGRES_USER: ngo_user
      POSTGRES_PASSWORD: ngo_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://ngo_user:ngo_password@postgres:5432/ngo_db
      NODE_ENV: development
    depends_on:
      - postgres
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app

volumes:
  postgres_data:
